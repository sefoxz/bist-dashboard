name: Veri Güncelle

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python veri_guncelle.py
      - run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add dashboard_veri.json
          git diff --staged --quiet || git commit -m "Veri güncelleme [skip ci]"
          git push
